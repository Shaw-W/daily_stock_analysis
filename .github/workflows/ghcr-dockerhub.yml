name: Docker Manual Publish

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag version (e.g., v1.0.0, latest)'
        required: true
        default: 'v1.0.0'

jobs:
  disabled:
    runs-on: ubuntu-24.04
    steps:
      - name: Disabled
        run: |
          echo "Docker Manual Publish is disabled. Use Docker Release Publish for GHCR releases."
          exit 1
